<div class="search-section px-3">
    <div class="search-section__input">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-search absolute left-3 top-2.5 h-4 w-4 text-gray-400" aria-hidden="true"><path d="m21 21-4.34-4.34"></path><circle cx="11" cy="11" r="8"></circle></svg>
        <input type="text" id="shopSearch" class="form-control search-input" placeholder="Search T3Planet Shop...">
    </div>
    <select id="shopSectionFilter" class="search-section__select form-select w-auto" style="min-width: 220px;">
        <option value="All Sections" selected><f:translate key="license-shop.all-sections" extensionName="ns_license" /></option>
        <f:for each="{shopData.sections}" as="section">
            <option value="{section.title}">{section.title}</option>
        </f:for>
    </select>
    <button class="btn btn-primary refresh-data-button" data-type="shop">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-rotate-cw h-4 w-4" aria-hidden="true"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"></path><path d="M21 3v5h-5"></path></svg>
        <f:translate key="license-extensions.get-updates" />
    </button>
</div>

<f:if condition="{shopData.sections}">
    <div class="card">
        <f:for each="{shopData.sections}" as="section">
            <div id="{section.id}-wrapper" class="extension-section">
                <div class="card-header px-3">
                    <div class="extension-section__header">
                        <div class="extension-section__header-icon">
                            <f:if condition="{section.id}== 'ai-universe'">
                                <f:then>
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="24"><g fill="currentColor"><path d="m14.718 3.404-2.122-2.122a.5.5 0 0 0-.707 0L1.282 11.89a.5.5 0 0 0 0 .707l2.122 2.122a.5.5 0 0 0 .707 0L14.718 4.11a.5.5 0 0 0 0-.707ZM3.758 13.657l-1.415-1.414 6.718-6.718 1.414 1.414-6.718 6.718Zm6.01-8.839 2.475-2.475 1.414 1.414-2.475 2.475-1.414-1.414ZM6.75 2H6v-.75A.25.25 0 0 0 5.75 1h-.5a.25.25 0 0 0-.25.25V2h-.75a.25.25 0 0 0-.25.25v.5c0 .138.112.25.25.25H5v.75c0 .138.112.25.25.25h.5A.25.25 0 0 0 6 3.75V3h.75A.25.25 0 0 0 7 2.75v-.5A.25.25 0 0 0 6.75 2ZM14.75 12H13v-1.75a.25.25 0 0 0-.25-.25h-.5a.25.25 0 0 0-.25.25V12h-1.75a.25.25 0 0 0-.25.25v.5c0 .138.112.25.25.25H12v1.75c0 .138.112.25.25.25h.5a.25.25 0 0 0 .25-.25V13h1.75a.25.25 0 0 0 .25-.25v-.5a.25.25 0 0 0-.25-.25Z"/></g></svg>
                                </f:then>
                                <f:else>
                                    <f:if condition="{section.id} == 'premium-templates'">
                                        <f:then>
                                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="24"><g><path fill="#FFF" d="M1 1h14v14H1z"/><path fill="#999" d="M14 2v12H2V2h12m1-1H1v14h14V1z"/><path fill="#666" d="M3 3h10v3H3zM3 7h3v6H3z"/><path fill="#B9B9B9" d="M7 7h6v6H7z"/></g></svg>
                                        </f:then>
                                        <f:else>
                                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="24"><g fill="currentColor"><path d="M13.408 3.546 7.913 1.087a1.002 1.002 0 0 0-.817 0L1.592 3.545c-.36.161-.592.519-.592.914v7.102a1 1 0 0 0 .594.914l5.496 2.439a1.003 1.003 0 0 0 .812 0l5.504-2.446a1 1 0 0 0 .594-.914V4.459a1 1 0 0 0-.592-.913zM7.504 2l4.89 2.187L7.5 6.449 2.607 4.188 7.504 2zM2 5.01l5 2.31v6.46l-5-2.219V5.01zm6 8.766V7.32l5-2.31v6.545l-5 2.221z"/></g></svg>
                                        </f:else>
                                    </f:if>
                                </f:else>
                            </f:if>
                        </div>
                        <div class="extension-section__header-content">
                            <div class="extension-section__header-title">{section.title}</div>
                            <div class="extension-section__header-description">{section.description}</div>
                        </div>
                    </div>
                    <div class="extension-section__header-status">
                        <f:if condition="{section.id} == 'ai-universe'">
                            <f:then>
                                <a href="https://t3planet.de/typo3-ki" class="btn btn-primary btn-sm" target="_blank" rel="noopener"><f:translate key="license-shop.all-extensions" extensionName="ns_license" />
                                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" xmlns="http://www.w3.org/2000/svg"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <g id="Interface / External_Link"> <path id="Vector" d="M10.0002 5H8.2002C7.08009 5 6.51962 5 6.0918 5.21799C5.71547 5.40973 5.40973 5.71547 5.21799 6.0918C5 6.51962 5 7.08009 5 8.2002V15.8002C5 16.9203 5 17.4801 5.21799 17.9079C5.40973 18.2842 5.71547 18.5905 6.0918 18.7822C6.5192 19 7.07899 19 8.19691 19H15.8031C16.921 19 17.48 19 17.9074 18.7822C18.2837 18.5905 18.5905 18.2839 18.7822 17.9076C19 17.4802 19 16.921 19 15.8031V14M20 9V4M20 4H15M20 4L13 11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path> </g> </g></svg>
                                </a>
                            </f:then>
                            <f:else>
                                <f:if condition="{section.id} == 'premium-templates'">
                                    <f:then>
                                        <a href="https://t3planet.de/typo3-templates" class="btn btn-primary btn-sm" target="_blank" rel="noopener"><f:translate key="license-shop.all-templates" extensionName="ns_license" />
                                            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" xmlns="http://www.w3.org/2000/svg"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <g id="Interface / External_Link"> <path id="Vector" d="M10.0002 5H8.2002C7.08009 5 6.51962 5 6.0918 5.21799C5.71547 5.40973 5.40973 5.71547 5.21799 6.0918C5 6.51962 5 7.08009 5 8.2002V15.8002C5 16.9203 5 17.4801 5.21799 17.9079C5.40973 18.2842 5.71547 18.5905 6.0918 18.7822C6.5192 19 7.07899 19 8.19691 19H15.8031C16.921 19 17.48 19 17.9074 18.7822C18.2837 18.5905 18.5905 18.2839 18.7822 17.9076C19 17.4802 19 16.921 19 15.8031V14M20 9V4M20 4H15M20 4L13 11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path> </g> </g></svg>
                                        </a>
                                    </f:then>
                                    <f:else>
                                        <a href="https://t3planet.de/typo3-extensions" class="btn btn-primary btn-sm" target="_blank" rel="noopener"><f:translate key="license-shop.all-extensions" extensionName="ns_license" />
                                            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" xmlns="http://www.w3.org/2000/svg"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <g id="Interface / External_Link"> <path id="Vector" d="M10.0002 5H8.2002C7.08009 5 6.51962 5 6.0918 5.21799C5.71547 5.40973 5.40973 5.71547 5.21799 6.0918C5 6.51962 5 7.08009 5 8.2002V15.8002C5 16.9203 5 17.4801 5.21799 17.9079C5.40973 18.2842 5.71547 18.5905 6.0918 18.7822C6.5192 19 7.07899 19 8.19691 19H15.8031C16.921 19 17.48 19 17.9074 18.7822C18.2837 18.5905 18.5905 18.2839 18.7822 17.9076C19 17.4802 19 16.921 19 15.8031V14M20 9V4M20 4H15M20 4L13 11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path> </g> </g></svg>
                                        </a>
                                    </f:else>
                                </f:if>
                            </f:else>
                        </f:if>
                    </div>
                </div>
                <div class="card-body card-container px-3">
                    <f:for each="{section.items}" as="item">
                        <div class="extension-card-wrapper card card-size-small {section.id}-shop-card" data-name="{item.name}" data-section="{section.title}" data-description="{item.description}">
                            <div class="card-header">
                                <div class="card-header__title">
                                    <div class="card-header__title-icon extension-section__header-icon">
                                        <f:if condition="{section.id}== 'ai-universe'">
                                            <f:then>
                                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="24"><g fill="currentColor"><path d="m14.718 3.404-2.122-2.122a.5.5 0 0 0-.707 0L1.282 11.89a.5.5 0 0 0 0 .707l2.122 2.122a.5.5 0 0 0 .707 0L14.718 4.11a.5.5 0 0 0 0-.707ZM3.758 13.657l-1.415-1.414 6.718-6.718 1.414 1.414-6.718 6.718Zm6.01-8.839 2.475-2.475 1.414 1.414-2.475 2.475-1.414-1.414ZM6.75 2H6v-.75A.25.25 0 0 0 5.75 1h-.5a.25.25 0 0 0-.25.25V2h-.75a.25.25 0 0 0-.25.25v.5c0 .138.112.25.25.25H5v.75c0 .138.112.25.25.25h.5A.25.25 0 0 0 6 3.75V3h.75A.25.25 0 0 0 7 2.75v-.5A.25.25 0 0 0 6.75 2ZM14.75 12H13v-1.75a.25.25 0 0 0-.25-.25h-.5a.25.25 0 0 0-.25.25V12h-1.75a.25.25 0 0 0-.25.25v.5c0 .138.112.25.25.25H12v1.75c0 .138.112.25.25.25h.5a.25.25 0 0 0 .25-.25V13h1.75a.25.25 0 0 0 .25-.25v-.5a.25.25 0 0 0-.25-.25Z"/></g></svg>
                                            </f:then>
                                            <f:else>
                                                <f:if condition="{section.id} == 'premium-templates'">
                                                    <f:then>
                                                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="24"><g><path fill="#FFF" d="M1 1h14v14H1z"/><path fill="#999" d="M14 2v12H2V2h12m1-1H1v14h14V1z"/><path fill="#666" d="M3 3h10v3H3zM3 7h3v6H3z"/><path fill="#B9B9B9" d="M7 7h6v6H7z"/></g></svg>
                                                    </f:then>
                                                    <f:else>
                                                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="24"><g fill="currentColor"><path d="M13.408 3.546 7.913 1.087a1.002 1.002 0 0 0-.817 0L1.592 3.545c-.36.161-.592.519-.592.914v7.102a1 1 0 0 0 .594.914l5.496 2.439a1.003 1.003 0 0 0 .812 0l5.504-2.446a1 1 0 0 0 .594-.914V4.459a1 1 0 0 0-.592-.913zM7.504 2l4.89 2.187L7.5 6.449 2.607 4.188 7.504 2zM2 5.01l5 2.31v6.46l-5-2.219V5.01zm6 8.766V7.32l5-2.31v6.545l-5 2.221z"/></g></svg>
                                                    </f:else>
                                                </f:if>
                                            </f:else>
                                        </f:if>
                                    </div>
                                    <div class="card-header__title-content">
                                        <h3 class="h4 mb-0"><b>{item.name}</b></h3>
                                        <f:if condition="{item.extensionKey}">
                                            <span>{item.extensionKey} • {item.version}</span>
                                        </f:if>
                                    </div>
                                </div>
                            </div>
                            <div class="card-body">
                                <p>{item.description}</p>
                                <div class="meta-info">
                                    <f:if condition="{item.rating}">
                                        <div class="meta-item">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="#fdd663" stroke="#fdd663" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-star h-3.5 w-3.5 fill-amber-400 text-amber-400" aria-hidden="true"><path d="M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a2.123 2.123 0 0 0 1.595 1.16l5.166.756a.53.53 0 0 1 .294.904l-3.736 3.638a2.123 2.123 0 0 0-.611 1.878l.882 5.14a.53.53 0 0 1-.771.56l-4.618-2.428a2.122 2.122 0 0 0-1.973 0L6.396 21.01a.53.53 0 0 1-.77-.56l.881-5.139a2.122 2.122 0 0 0-.611-1.879L2.16 9.795a.53.53 0 0 1 .294-.906l5.165-.755a2.122 2.122 0 0 0 1.597-1.16z"></path></svg>
                                            <span>{item.rating}</span>
                                        </div>
                                    </f:if>
                                    <f:if condition="{item.downloads}">
                                        <div class="meta-item">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-download h-3.5 w-3.5" aria-hidden="true"><path d="M12 15V3"></path><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><path d="m7 10 5 5 5-5"></path></svg>
                                            <span>{item.downloads}</span>
                                        </div>
                                    </f:if>
                                    <f:if condition="{item.price}">
                                        <div class="meta-item meta-item--price">
                                            <span>{item.price}</span>
                                        </div>
                                    </f:if>
                                </div>
                            </div>
                            <div class="card-footer">
                                <div class="actions-wrapper">
                                    <f:if condition="{item.knowMoreUrl}">
                                        <a href="{item.knowMoreUrl}" class="btn btn-default" target="_blank">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-file-text h-3.5 w-3.5 mr-1.5" aria-hidden="true"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"></path><path d="M14 2v4a2 2 0 0 0 2 2h4"></path><path d="M10 9H8"></path><path d="M16 13H8"></path><path d="M16 17H8"></path></svg>
                                            <span><f:translate key="license-shop.know-more" extensionName="ns_license" /></span>
                                        </a>
                                    </f:if>
                                    <f:if condition="{item.liveDemoUrl}">
                                        <a href="{item.liveDemoUrl}" class="btn btn-default" target="_blank">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-globe h-3.5 w-3.5 mr-1.5" aria-hidden="true"><circle cx="12" cy="12" r="10"></circle><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"></path><path d="M2 12h20"></path></svg>
                                            <span><f:translate key="license-shop.live-demo" extensionName="ns_license" /></span>
                                        </a>
                                    </f:if>
                                </div>
                            </div>
                        </div>
                    </f:for>
                </div>
            </div>
        </f:for>
    </div>
</f:if>
