<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
     xmlns:core="http://typo3.org/ns/TYPO3/CMS/Core/ViewHelpers" data-namespace-typo3-fluid="true">
<f:layout name="Module" />

<f:section name="Content">
    <f:if condition="{t3version} == 12 || {t3version} == 14">
        <f:be.pageRenderer includeCssFiles="{0:'EXT:ns_license/Resources/Public/css/custom-12.css'}" />
    </f:if>
    <f:be.pageRenderer includeJavaScriptModules="{0:'@nitsan/ns-license/main.js', 1:'@nitsan/ns-license/filter.js',2:'@nitsan/ns-license/domains.js'}" />
      <!-- Tab Content -->
      <div class="tab-content" id="license-tab-content">
        <!-- My Extensions Tab Pane -->
        <div class="tab-pane fade show active" id="extensions-pane" role="tabpanel" aria-labelledby="my-extensions-tab">
            <!-- My Extensions Section -->
            <div class="row">
                <div class="col-sm-12">
                    <div class="card custom-card mt-4 mx-3">
                        <div class="card-header">
                            <h5>
                                <f:if condition="{showUpdateButton}">
                                    <f:then><f:translate key="license-activation.btn-activate-composer" extensionName="ns_license" /></f:then>
                                    <f:else><f:translate key="license-activation.btn-activate" extensionName="ns_license" /></f:else>
                                </f:if>
                            </h5>
                        </div>
                        <div class="card-body">
                            <div class="ns-license-activation-form">
                                <f:form action="activation" class="ns-license-form ns-ext-form">
                                    <div class="form-group d-flex gap-3">
                                        <f:form.textfield
                                            name="license"
                                            class="form-control"
                                            id="license"
                                            required="required"
                                            placeholder="{f:translate(key: 'license-activation.licensepLaceholder')}"
                                        />
                                        <f:variable name="activateButtonLabel"><f:if condition="{showUpdateButton}"><f:then><f:translate key="license-activation.btn-activate-composer" extensionName="ns_license" /></f:then><f:else><f:translate key="license-activation.btn-activate" extensionName="ns_license" /></f:else></f:if></f:variable>
                                        <f:form.submit class="btn btn-primary" value="{activateButtonLabel}" />
                                    </div>
                                    <div class="mb-3 form-check form-check-type-toggle">
                                        <f:form.checkbox id="overwrite" name="overwrite" value="1" class="form-check-input mt-0" />
                                        <label class="customform-check-label form-check-label" for="overwrite"><f:translate key="license-activation.overwriteExtension" />?</label>
                                    </div>
                                </f:form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <f:if condition="{extensions.premium} || {extensions.free}">
                <f:then><f:render partial="Extensions" arguments="{_all}" /></f:then>
                <f:else><p class="mt-3 text-muted mx-3"><f:translate key="fetchData.error.no_license_keys" /></p></f:else>
            </f:if>
        </div>        
        <!-- Shop Tab Pane -->
        <div class="tab-pane fade mt-4" id="shop-pane" role="tabpanel" aria-labelledby="shop-tab" 
             data-shop-url="{f:uri.action(action: 'getShopData', absolute: 1)}"
             data-loading-label="{f:translate(key: 'license-loading.shop')}"
             data-error-url-not-found="{f:translate(key: 'license-loading.error.shop-url-not-found')}"
             data-error-failed="{f:translate(key: 'license-loading.error.shop-failed')}"
             data-error-loading="{f:translate(key: 'license-loading.error.shop-error')}">
            <div class="shop-loading-placeholder text-center py-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden"><f:translate key="license-loading.loading" /></span>
                </div>
                <p class="mt-3 text-muted"><f:translate key="license-loading.shop" /></p>
            </div>
            <div class="shop-content" style="display: none;"></div>
        </div>

        <!-- Services Tab Pane -->
        <div class="tab-pane fade mt-4" id="services-pane" role="tabpanel" aria-labelledby="services-tab" 
             data-services-url="{f:uri.action(action: 'getServicesData', absolute: 1)}"
             data-loading-label="{f:translate(key: 'license-loading.services')}"
             data-error-url-not-found="{f:translate(key: 'license-loading.error.services-url-not-found')}"
             data-error-failed="{f:translate(key: 'license-loading.error.services-failed')}"
             data-error-loading="{f:translate(key: 'license-loading.error.services-error')}">
            <div class="services-loading-placeholder text-center py-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden"><f:translate key="license-loading.loading" /></span>
                </div>
                <p class="mt-3 text-muted"><f:translate key="license-loading.services" /></p>
            </div>
            <div class="services-content" style="display: none;"></div>
        </div>
    </div>
</f:section>
</html>
